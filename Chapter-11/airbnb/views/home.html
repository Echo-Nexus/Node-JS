<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Clone</title>
    <!-- Tailwind CSS for rapid, precise styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for typography similar to Airbnb's Circular font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">

    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Nunito Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: '#FF385C',
                        dark: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .hide-scroll {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-white text-dark antialiased">

    <!-- Header Section -->
    <header class="border-b border-gray-200 pb-4 md:pb-6 pt-4 px-4 md:px-10 xl:px-20 sticky top-0 bg-white z-50">
        <div class="flex flex-wrap md:flex-nowrap justify-between items-center md:items-start gap-y-4">
            
            <!-- Logo -->
            <div class="text-brand flex items-center gap-1.5 md:mt-2 cursor-pointer order-1">
                <svg width="34" height="34" viewBox="0 0 32 32" fill="currentColor">
                    <path d="M16 1c2.008 0 3.463.963 4.751 3.269l.533 1.025c1.954 3.83 6.114 12.54 7.1 14.836l.145.353c.667 1.591.91 2.472.96 3.396l.01.415.001.228c0 4.062-2.877 6.478-6.357 6.478-2.224 0-4.556-1.258-6.709-3.386l-.257-.26-.172-.179h-.011l-.176.185c-2.044 2.1-4.393 3.405-6.701 3.405-3.48 0-6.358-2.416-6.358-6.478 0-1.12.223-2.108.932-3.75l.237-.533c.644-1.423 4.839-10.424 7.14-14.836l.533-1.025C12.537 1.963 13.992 1 16 1zm0 2c-1.232 0-2.328.592-3.413 2.52l-.533 1.025c-2.301 4.412-6.496 13.413-7.14 14.836l-.237.533c-.63 1.455-.807 2.222-.841 2.915L3.834 25.1c0 2.917 1.996 4.478 4.358 4.478 1.83 0 3.816-1.066 5.61-2.91l.245-.255.43-.448.43.448.245.255c1.794 1.844 3.78 2.91 5.61 2.91 2.362 0 4.357-1.56 4.357-4.478l-.001-.228c-.021-.716-.192-1.481-.823-3.033l-.161-.39c-.986-2.296-5.146-11.006-7.1-14.836l-.533-1.025C18.328 3.592 17.232 3 16 3z"/>
                </svg>
                <span class="text-[22px] font-bold tracking-tight hidden lg:block">airbnb</span>
            </div>

            <!-- Mobile Right Navigation (Simplified) -->
            <div class="flex md:hidden items-center order-2">
                <button class="flex items-center gap-2 border border-gray-300 rounded-full p-1.5 hover:shadow-md transition-shadow bg-white">
                    <div class="bg-gray-500 text-white rounded-full p-1 overflow-hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </button>
            </div>

            <!-- Center Navigation & Search Area -->
            <div class="flex flex-col items-center gap-4 md:gap-5 w-full md:w-auto order-3 md:order-2">
                
                <!-- Mobile Search Bar -->
                <div class="flex md:hidden w-full items-center bg-white rounded-full shadow-[0_3px_10px_rgba(0,0,0,0.1)] border border-gray-200 px-4 py-2.5 gap-4 hover:shadow-[0_4px_12px_rgba(0,0,0,0.12)] transition-shadow">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-gray-800">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                    <div class="flex flex-col">
                        <span class="text-sm font-semibold text-gray-900">Anywhere</span>
                        <span class="text-[12px] text-gray-500">Any week • Add guests</span>
                    </div>
                </div>

                <!-- Category Tabs -->
                <div class="flex gap-6 md:gap-8 items-center md:mt-1 w-full md:w-auto overflow-x-auto hide-scroll pb-2 md:pb-0 justify-start md:justify-center">
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group relative shrink-0">
                        <div class="text-2xl">🏠</div>
                        <span class="text-sm font-semibold text-gray-900">Homes</span>
                        <div class="h-[2px] w-full bg-gray-900 absolute -bottom-2 rounded-full"></div>
                    </div>
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group relative shrink-0">
                        <div class="absolute -top-2.5 -right-4 bg-dark text-white text-[10px] font-bold px-1.5 py-[1px] rounded shadow-sm z-10 tracking-wide">NEW</div>
                        <div class="text-2xl grayscale group-hover:grayscale-0 opacity-80 group-hover:opacity-100 transition-all">🎈</div>
                        <span class="text-sm font-medium text-gray-500 group-hover:text-gray-900 transition-colors">Experiences</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer group relative shrink-0 pr-4 md:pr-0">
                        <div class="absolute -top-2.5 -right-4 bg-dark text-white text-[10px] font-bold px-1.5 py-[1px] rounded shadow-sm z-10 tracking-wide">NEW</div>
                        <div class="text-2xl grayscale group-hover:grayscale-0 opacity-80 group-hover:opacity-100 transition-all">🛎️</div>
                        <span class="text-sm font-medium text-gray-500 group-hover:text-gray-900 transition-colors">Services</span>
                    </div>
                </div>

                <!-- Main Search Bar (Desktop) -->
                <div class="hidden md:flex items-center bg-white rounded-full shadow-[0_3px_12px_rgba(0,0,0,0.1)] border border-gray-200 mx-auto w-max overflow-hidden hover:shadow-[0_4px_16px_rgba(0,0,0,0.12)] transition-shadow">
                    <div class="px-8 py-3.5 hover:bg-gray-100 rounded-full cursor-pointer flex flex-col justify-center min-w-[150px]">
                        <div class="text-[11px] font-bold text-gray-800 tracking-wider">Where</div>
                        <div class="text-[13px] text-gray-500">Search destinations</div>
                    </div>
                    <div class="w-[1px] h-10 bg-gray-300"></div>
                    <div class="px-8 py-3.5 hover:bg-gray-100 rounded-full cursor-pointer flex flex-col justify-center min-w-[150px]">
                        <div class="text-[11px] font-bold text-gray-800 tracking-wider">When</div>
                        <div class="text-[13px] text-gray-500">Add dates</div>
                    </div>
                    <div class="w-[1px] h-10 bg-gray-300"></div>
                    <div class="pl-8 pr-2 py-2 flex items-center hover:bg-gray-100 rounded-full cursor-pointer gap-4 min-w-[200px] justify-between">
                        <div class="flex flex-col justify-center">
                            <div class="text-[11px] font-bold text-gray-800 tracking-wider">Who</div>
                            <div class="text-[13px] text-gray-500">Add guests</div>
                        </div>
                        <div class="bg-brand hover:bg-[#E31C5F] text-white p-3.5 rounded-full flex items-center justify-center transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Navigation User Menu (Desktop) -->
            <div class="hidden md:flex items-center gap-1 mt-2 order-3">
                <button class="text-[14px] font-medium text-gray-800 hover:bg-gray-100 px-4 py-2.5 rounded-full transition-colors hidden md:block">Become a host</button>
                <button class="p-2.5 hover:bg-gray-100 rounded-full transition-colors text-gray-800">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
                    </svg>
                </button>
                <button class="flex items-center gap-3 border border-gray-300 rounded-full p-2 pl-3 hover:shadow-md transition-shadow bg-white ml-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-gray-700">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                    <div class="bg-gray-500 text-white rounded-full p-1 overflow-hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 mt-1">
                            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content App -->
    <main id="app-content" class="py-6 md:py-10"></main>

    <script>
        // Data mimicking the provided screenshot's layout and content
        const sectionsData = [
            {
                id: "kathmandu",
                title: "Popular homes in Kathmandu",
                items: [
                    { title: "Apartment in Lalitpur", price: "$80 for 2 nights", rating: "5.0", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=600&q=80" },
                    { title: "Room in Lalitpur", price: "$80 for 2 nights", rating: "4.99", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600&q=80" },
                    { title: "Home in Kathmandu", price: "$60 for 2 nights", rating: "5.0", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&q=80" },
                    { title: "Villa in Kathmandu", price: "$128 for 2 nights", rating: "4.97", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=600&q=80" },
                    { title: "Room in Lalitpur", price: "$80 for 2 nights", rating: "4.97", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=600&q=80" },
                    { title: "Room in Lalitpur", price: "$77 for 2 nights", rating: "4.96", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1560185127-6ed189bf02f4?w=600&q=80" },
                    { title: "Room in Lalitpur", price: "$38 for 2 nights", rating: "5.0", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1536376072261-38c75010e6c9?w=600&q=80" }
                ]
            },
            {
                id: "seoul",
                title: "Available next month in Seoul",
                items: [
                    { title: "Boutique hotel in Seoul", price: "$78 for 2 nights", rating: "4.81", isGuestFavorite: true, img: "https://a0.muscache.com/im/pictures/hosting/Hosting-606994416871476704/original/43bf2cf4-1ab6-4d7f-abd2-9ff3a9422fab.jpeg?im_w=720" },
                    { title: "Hotel in Seoul", price: "$55 for 2 nights", rating: "5.0", isGuestFavorite: false, img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=600&q=80" },
                    { title: "Shared hotel room in Seoul", price: "$69 for 2 nights", rating: "4.82", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=600&q=80" },
                    { title: "Bed and breakfast in Seodaemun-gu", price: "$87 for 2 nights", rating: "4.76", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1535827841776-24afc1e255ac?w=600&q=80" },
                    { title: "Shared room in Seodaemun-gu", price: "$52 for 2 nights", rating: "4.79", isGuestFavorite: true, img: "https://a0.muscache.com/im/pictures/hosting/Hosting-1652794851719802617/original/85b8d815-ff2a-4a0e-8a18-87b5513f2451.jpeg?im_w=720" },
                    { title: "Room in Seoul", price: "$85 for 2 nights", rating: "4.86", isGuestFavorite: true, img: "https://a0.muscache.com/im/pictures/1a73c734-91b1-4519-809c-8468a50d0a9a.jpg?im_w=1200" },
                    { title: "Room in Yongsan-gu", price: "$128 for 2 nights", rating: "4.95", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?w=600&q=80" }
                ]
            },
            {
                id: "tokyo",
                title: "Stay in Tokyo",
                items: [
                    { title: "Apartment in Tokyo", price: "$110 for 2 nights", rating: "4.98", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1502672023488-70e25813eb80?w=600&q=80" },
                    { title: "Room in Shinjuku", price: "$85 for 2 nights", rating: "4.92", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=600&q=80" },
                    { title: "Hotel in Shibuya", price: "$140 for 2 nights", rating: "4.88", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1505693314120-0d443867891c?w=600&q=80" },
                    { title: "Home in Minato", price: "$200 for 2 nights", rating: "5.0", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&q=80" },
                    { title: "Room in Chiyoda", price: "$90 for 2 nights", rating: "4.75", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600&q=80" },
                    { title: "Apartment in Roppongi", price: "$160 for 2 nights", rating: "4.95", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1501183638710-841dd1904471?w=600&q=80" },
                    { title: "Studio in Tokyo", price: "$75 for 2 nights", rating: "4.80", isGuestFavorite: true, img: "https://images.unsplash.com/photo-1494526585095-c41746248156?w=600&q=80" }
                ]
            }
        ];

        // Component rendering
        function renderUI() {
            const app = document.getElementById('app-content');
            let htmlContent = '';

            sectionsData.forEach(section => {
                htmlContent += `
                    <div class="mb-12 md:mb-14">
                        <!-- Section Header -->
                        <div class="flex justify-between items-end mb-4 md:mb-5 px-4 md:px-10 xl:px-20">
                            <div class="flex items-center gap-2 md:gap-3">
                                <h2 class="text-xl md:text-[26px] font-bold text-gray-900 tracking-tight">${section.title}</h2>
                                <button class="w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors mt-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 md:w-4 md:h-4 text-gray-800">
                                      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                                    </svg>
                                </button>
                            </div>
                            <!-- Hidden on mobile since users can just swipe the carousel horizontally -->
                            <div class="hidden md:flex gap-2">
                                <button id="left-${section.id}" class="w-[34px] h-[34px] rounded-full border border-gray-300 flex items-center justify-center hover:scale-[1.04] hover:shadow-md transition-all disabled:opacity-30 disabled:hover:scale-100 disabled:hover:shadow-none disabled:cursor-not-allowed bg-white" disabled>
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-gray-800">
                                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                                    </svg>
                                </button>
                                <button id="right-${section.id}" class="w-[34px] h-[34px] rounded-full border border-gray-300 flex items-center justify-center hover:scale-[1.04] hover:shadow-md transition-all disabled:opacity-30 disabled:hover:scale-100 disabled:hover:shadow-none disabled:cursor-not-allowed bg-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-gray-800">
                                      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Scrollable Horizontal Container -->
                        <div class="relative w-full">
                            <div id="scroll-${section.id}" class="flex gap-4 md:gap-[22px] overflow-x-auto snap-x snap-mandatory hide-scroll px-4 md:px-10 xl:px-20 pb-4">
                                ${section.items.map(item => `
                                    <div class="snap-start shrink-0 w-[85vw] sm:w-[45vw] md:w-[30vw] lg:w-[22vw] xl:w-[17vw] flex flex-col gap-2.5 md:gap-3 group cursor-pointer">
                                        <div class="relative aspect-[20/19] overflow-hidden rounded-2xl bg-gray-200">
                                            <img src="${item.img}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy" />
                                            ${item.isGuestFavorite ? `
                                                <div class="absolute top-3 left-3 bg-white px-3 py-1 md:py-1.5 rounded-full text-[12px] md:text-[13px] font-bold text-gray-900 shadow-[0_2px_4px_rgba(0,0,0,0.18)] flex items-center">
                                                    Guest favorite
                                                </div>
                                            ` : ''}
                                            <button class="absolute top-3 right-3 text-white transition-transform active:scale-95">
                                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="w-6 h-6 md:w-7 md:h-7 fill-black/40 hover:fill-black/60 transition-colors">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                                                </svg>
                                            </button>
                                        </div>
                                        <div class="flex flex-col gap-[2px]">
                                            <h3 class="font-bold text-[14px] md:text-[15px] text-gray-900 leading-tight truncate">${item.title}</h3>
                                            <p class="text-[14px] md:text-[15px] text-gray-600 leading-tight truncate">${item.price} · ★ ${item.rating}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            app.innerHTML = htmlContent;

            // Initialize carousel behaviors
            sectionsData.forEach(section => {
                initCarousel(section.id);
            });
        }

        // Logic for horizontal sliding carousels
        function initCarousel(sectionId) {
            const container = document.getElementById(`scroll-${sectionId}`);
            const leftBtn = document.getElementById(`left-${sectionId}`);
            const rightBtn = document.getElementById(`right-${sectionId}`);

            if (!leftBtn || !rightBtn) return; // Ignore on mobile where buttons are hidden

            const checkScrollState = () => {
                // Determine limits accounting for fractional scroll pixel rendering
                const isAtStart = container.scrollLeft <= 5;
                const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 5;
                
                leftBtn.disabled = isAtStart;
                rightBtn.disabled = isAtEnd;
            };

            // Listeners
            container.addEventListener('scroll', checkScrollState);
            window.addEventListener('resize', checkScrollState);
            checkScrollState(); // Run once on load

            // Button actions - scroll by approx width of container
            leftBtn.onclick = () => {
                container.scrollBy({ left: -container.clientWidth * 0.8, behavior: 'smooth' });
            };
            rightBtn.onclick = () => {
                container.scrollBy({ left: container.clientWidth * 0.8, behavior: 'smooth' });
            };
        }

        // Boot up
        document.addEventListener('DOMContentLoaded', renderUI);

    </script>
</body>
</html>
